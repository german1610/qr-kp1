<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QR Sistema PRO - KP1 COLOR</title>
<style>
body{font-family:Arial;background:#e8e8e8;padding:10px}
h1{text-align:center;background:#1F3864;color:#fff;padding:10px;border-radius:8px}

.panel{background:#fff;padding:10px;margin-bottom:10px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.2)}
button{margin:3px;padding:8px 12px;border:none;border-radius:6px;background:#ddd;cursor:pointer;font-weight:bold}
button.active{background:#1F3864;color:#fff}

.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px}

.card{border-radius:8px;padding:5px;text-align:center;box-shadow:0 2px 5px rgba(0,0,0,.2)}
.hdr{font-size:10px;font-weight:bold;margin-bottom:5px;word-break:break-all;color:#fff;padding:4px;border-radius:5px}
.inf{font-size:10px;margin-top:3px}
.hidden{display:none}

/* colores por nivel */
.n1{background:#E3F2FD;border:2px solid #1565C0}
.n1 .hdr{background:#1565C0}

.n2{background:#E8F5E9;border:2px solid #2E7D32}
.n2 .hdr{background:#2E7D32}

.n3{background:#FFF3E0;border:2px solid #E65100}
.n3 .hdr{background:#E65100}

.n4{background:#FFEBEE;border:2px solid #C00000}
.n4 .hdr{background:#C00000}

</style>
</head>
<body>

<h1>QR Sistema PRO - KP1</h1>

<div class="panel">
<b>Sector:</b><br>
<button onclick="toggleFilter('s','M',this)" class="active">M</button>
<button onclick="toggleFilter('s','N',this)" class="active">N</button>
<button onclick="toggleFilter('s','O',this)" class="active">O</button>
<button onclick="toggleFilter('s','P',this)" class="active">P</button>
<button onclick="toggleFilter('s','Q',this)" class="active">Q</button>
</div>

<div class="panel">
<b>Estantería:</b><br>
<button onclick="toggleFilter('e','1',this)" class="active">1</button>
<button onclick="toggleFilter('e','2',this)" class="active">2</button>
</div>

<div class="panel">
<b>Nivel:</b><br>
<button onclick="toggleFilter('n','1',this)" class="active">🔵 1</button>
<button onclick="toggleFilter('n','2',this)" class="active">🟢 2</button>
<button onclick="toggleFilter('n','3',this)" class="active">🟠 3</button>
<button onclick="toggleFilter('n','4',this)" class="active">🔴 4</button>
</div>

<button onclick="resetAll()">Ver todos</button>

<div class="grid" id="grid"></div>

<script>
const sectores = ["M","N","O","P","Q"];
const niveles = ["1","2","3","4"];
const estanterias = ["1","2"];
const racks = ["01","02"];
const pallets = ["1","2","3"];

let filters = {
  s: new Set(sectores),
  e: new Set(estanterias),
  n: new Set(niveles)
};

const grid = document.getElementById("grid");

function generar(){
  sectores.forEach(s=>{
    niveles.forEach(n=>{
      estanterias.forEach(e=>{
        racks.forEach(r=>{
          pallets.forEach(p=>{

            const codigo = `kitingkp1.${s}.${n}.${r}.${p}`;

            const card = document.createElement("div");
            card.className = "card n"+n;
            card.dataset.s = s;
            card.dataset.e = e;
            card.dataset.n = n;

            card.innerHTML = `
              <div class="hdr">${codigo}</div>
              <img src="https://api.qrserver.com/v1/create-qr-code/?size=120x120&data=${codigo}">
              <div class="inf">Sector ${s} | Est ${e}</div>
              <div class="inf">Nivel ${n} | Rack ${r} | Pallet ${p}</div>
            `;

            grid.appendChild(card);

          });
        });
      });
    });
  });
}

function toggleFilter(tipo, valor, btn){
  if(filters[tipo].has(valor)){
    filters[tipo].delete(valor);
    btn.classList.remove("active");
  } else {
    filters[tipo].add(valor);
    btn.classList.add("active");
  }
  aplicarFiltros();
}

function aplicarFiltros(){
  document.querySelectorAll(".card").forEach(c=>{
    if(
      filters.s.has(c.dataset.s) &&
      filters.e.has(c.dataset.e) &&
      filters.n.has(c.dataset.n)
    ){
      c.classList.remove("hidden");
    } else {
      c.classList.add("hidden");
    }
  });
}

function resetAll(){
  filters = {
    s: new Set(sectores),
    e: new Set(estanterias),
    n: new Set(niveles)
  };
  document.querySelectorAll("button").forEach(b=>b.classList.add("active"));
  aplicarFiltros();
}

generar();
</script>

</body>
</html>
